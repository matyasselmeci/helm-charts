apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pelican-cache.fullname" . }}
  labels:
    {{- include "pelican-cache.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "pelican-cache.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "pelican-cache.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      enableServiceLinks: false
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          {{- if .Values.sleep }}
          args: ["infinity"]
          command: ["/bin/sleep"]
          {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: pelican
              containerPort: 8443
              protocol: TCP
            - name: pelican-webui
              containerPort: 443
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - mountPath: /cache
              name: cache-data
            - mountPath: /var/log/pelican
              name: logging-volume
          {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- if .Values.cvmfsCompatEnabled }}
      - image: hub.opensciencegrid.org/pelican_platform/port-redirector:latest
        imagePullPolicy: Always
        name: cvmfs-redirector
        ports:
        - containerPort: 8000
          name: pelican-cvmfs
        resources:
          requests:
            cpu: "1"
            memory: 1Gi
      {{- end }}
      - image: hub.opensciencegrid.org/opensciencegrid/logrotate:24-release
        imagePullPolicy: Always
        name: logrotate
        resources:
          limits:
            cpu: "2"
            memory: 2G
          requests:
            cpu: "1"
            memory: 500M
        volumeMounts:
        - mountPath: /var/log/pelican
          name: logging-volume
        - mountPath: /etc/logrotate.d/
          name: logrotate-config

      volumes:
        - name: cache-data
          persistentVolumeClaim:
            claimName: {{ .Values.cache.volume }}
        - name: logging-volume
          persistentVolumeClaim:
            claimName: {{ .Values.logging.volume }}
        - configMap: {{ include "pelican-cache.fullname" . }}-logrotate
          name: logrotate-config
      {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
